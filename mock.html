<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI English Mock Test Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans antialiased">

    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-8 border-b border-gray-800 pb-6">
            <h1 class="text-4xl font-extrabold text-blue-500 tracking-tight mb-2">🎯 AI English Mock Portal</h1>
            <p class="text-gray-400">Kisi bhi topic ya grammar rule ka custom mock test real-time me generate karein.</p>
        </header>

        <div id="setup-screen" class="bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700/50 space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-300 mb-2">📝 Topic / Concept Name</label>
                <input type="text" id="quiz-topic" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-400 focus:outline-none focus:border-blue-500 transition" placeholder="e.g., Reading Comprehension, Error Spotting, Noun, Synonyms...">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">🔢 Number of Questions</label>
                    <select id="question-count" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition">
                        <option value="5">5 Questions</option>
                        <option value="10" selected>10 Questions</option>
                        <option value="15">15 Questions</option>
                        <option value="20">20 Questions</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">📊 Difficulty Level</label>
                    <select id="difficulty-level" class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition">
                        <option value="Easy">Easy (Basic Concepts)</option>
                        <option value="Moderate" selected>Moderate (SSC Pre / Clerk Level)</option>
                        <option value="Hard">Hard (SSC Mains / Bank PO Level)</option>
                    </select>
                </div>
            </div>

            <button onclick="generateQuiz()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-lg shadow-lg hover:shadow-blue-500/20 transition duration-150 transform active:scale-[0.99]">
                Generate Mock Test 🚀
            </button>
        </div>

        <div id="loading-screen" class="hidden bg-gray-800 p-12 rounded-xl shadow-2xl border border-gray-700/50 text-center space-y-4">
            <div class="animate-spin inline-block w-10 h-10 border-[4px] border-current border-t-transparent text-blue-500 rounded-full" role="status" aria-label="loading"></div>
            <p class="text-xl font-medium text-white">Bhai, Premium Questions taiyaar ho rahe hain...</p>
            <p class="text-sm text-gray-400">AI rules aur pattern verify kar raha hai, thoda sa rukiye.</p>
        </div>

        <div id="quiz-screen" class="hidden bg-gray-800 p-6 rounded-xl shadow-2xl border border-gray-700/50 space-y-6">
            <div class="flex justify-between items-center border-b border-gray-700 pb-4">
                <span id="quiz-progress" class="text-sm font-bold tracking-wide text-blue-400 uppercase">Question 1 of 10</span>
                <button onclick="confirmEarlySubmit()" class="text-xs bg-red-900/60 hover:bg-red-900 text-red-300 px-3 py-1.5 rounded-lg border border-red-700/50 font-semibold transition">
                    Submit Test 🛑
                </button>
            </div>
            
            <div id="question-text" class="text-xl font-medium text-white leading-relaxed whitespace-pre-line"></div>
            
            <div id="options-container" class="grid grid-cols-1 gap-3 pt-2"></div>

            <button id="next-btn" onclick="nextQuestion()" disabled class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-700 disabled:text-gray-400 disabled:cursor-not-allowed text-white font-bold py-3.5 rounded-lg transition duration-150">
                Next Question ➡️
            </button>
        </div>

        <div id="result-screen" class="hidden space-y-6">
            <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700/50 text-center space-y-5">
                <h2 class="text-3xl font-black text-white">Scorecard 📝</h2>
                <p class="text-5xl font-black text-blue-500 my-2">
                    <span id="score-obtained">0</span> / <span id="total-score">0</span>
                </p>
                <div class="flex flex-col sm:flex-row gap-3 justify-center pt-2">
                    <button onclick="resetQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold px-6 py-3 rounded-lg transition flex-1 sm:flex-initial">
                        Naya Test Generate Karein 🔄
                    </button>
                    <button onclick="goBackToHome()" class="bg-gray-700 hover:bg-gray-600 text-gray-200 font-bold px-6 py-3 rounded-lg border border-gray-600 transition flex-1 sm:flex-initial">
                        Back to Home 🏠
                    </button>
                </div>
            </div>

            <h3 class="text-xl font-bold text-gray-300 pl-1">Detailed Analysis & Explanations 📊</h3>
            <div id="analysis-container" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let quizData = [];
        let currentQuestionIdx = 0;
        let userAnswers = [];
        let score = 0;

        async function generateQuiz() {
            // 👇 BHAI, ISS EK LINE ME APNI ASLI "AIzaSy..." WALI KEY PASTE KAR DENA
            const apiKey = "AQ.Ab8RN6LL_PShFA-W_xc79yPzg3PptKeE3kapPAsROpZXvBLKvg";
            
            const topic = document.getElementById('quiz-topic').value.trim();
            const count = document.getElementById('question-count').value;
            const difficulty = document.getElementById('difficulty-level').value;

            if (!topic) { alert('Bhai, kis topic par test dena chahte ho? Wo toh type karo!'); return; }

            // UI Mode Switch to Loading
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('loading-screen').classList.remove('hidden');

            const prompt = `You are a premium mock test developer for advanced examinations like SSC CGL, Bank PO, and NDA.
            Create a highly accurate, clean, and context-appropriate quiz on the English language topic/concept: "${topic}".
            Total number of multiple-choice questions needed: ${count}.
            Strict Difficulty benchmark: ${difficulty}.

            DYNAMIC FORMATTING RULES BASED ON THE USER'S INPUT:
            1. For READING COMPREHENSION / CLOZE TEST: Generate a high-quality, exam-standard passage first. For EVERY single question object in the array, you MUST prepend the full passage text at the start of the "question" field, followed by two line breaks (\\n\\n) and then the specific question statement (e.g., "[Passage: ...] \\n\\n Q1: What is the author's tone?").
            2. For SYNONYMS / ANTONYMS / VOCABULARY: Provide a clear word or sentence context in the "question" field, and ensure the 4 options contain clear, non-ambiguous choices appropriate for the requested difficulty level.
            3. For ERROR SPOTTING / SENTENCE IMPROVEMENT: Provide advanced, structurally complex sentences split into parts or standard options based on competitive exam patterns.
            4. For GENERAL GRAMMAR (Noun, Pronoun, Preposition, Subject-Verb Agreement, Specific Rules like Each/Every, Since/For): Provide high-yield fill-in-the-blanks or conceptual sentence structure questions.

            Respond ONLY with a valid, clean JSON array of objects. Do not wrap the JSON output inside \`\`\`json or any markdown blocks. No introduction, no summary text. Just raw JSON data.

            Each object in the array must strictly contain these exact four keys:
            1. "question": (String) The exact test statement or sentence. (Must include the full passage text at the top if it is a Reading Comprehension or Cloze Test).
            2. "options": (Array of 4 strings) Exactly 4 distinct choices (A, B, C, D).
            3. "correctIndex": (Number) The exact index of the correct answer option (0 for A, 1 for B, 2 for C, 3 for D).
            4. "explanation": (String) A comprehensive, step-by-step grammar rule or contextual explanation clarifying why that option is correct and why others are incorrect. Give short hints or rule breakdowns.`;

            const modelsToTry = [
                'https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent',
                'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent'
            ];

            let success = false;
            let lastError = "";

            if (!apiKey || apiKey.includes("YourRealKey")) {
                alert("Bhai, pehle apni AIzaSy waali asli key daalo code me!");
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('setup-screen').classList.remove('hidden');
                return;
            }

            for (let url of modelsToTry) {
                try {
                    const response = await fetch(`${url}?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();

                    if (data.error) {
                        lastError = data.error.message;
                        continue;
                    }

                    if (data.candidates && data.candidates.length > 0) {
                        let rawText = data.candidates[0].content.parts[0].text;
                        rawText = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
                        
                        quizData = JSON.parse(rawText);
                        success = true;
                        break;
                    }
                } catch (err) {
                    lastError = err.message;
                }
            }

            if (success) {
                currentQuestionIdx = 0;
                userAnswers = [];
                score = 0;
                
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                showQuestion();
            } else {
                alert(`Kuch issue aaya hai, bhai!\n\nDetails: ${lastError}\n\nEk baar check karein ki aapki Key sahi hai ya nahi.`);
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('setup-screen').classList.remove('hidden');
            }
        }

        function showQuestion() {
            const currentQuestion = quizData[currentQuestionIdx];
            document.getElementById('quiz-progress').innerText = `Question ${currentQuestionIdx + 1} of ${quizData.length}`;
            document.getElementById('question-text').innerText = currentQuestion.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            currentQuestion.options.forEach((option, idx) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-gray-700/80 hover:bg-gray-700 text-white px-5 py-4 rounded-xl border border-gray-600 transition duration-150 focus:outline-none flex items-center gap-3 select-none";
                
                const prefix = ['A', 'B', 'C', 'D'][idx];
                btn.innerHTML = `<span class="bg-gray-900 text-blue-400 font-bold px-2.5 py-1 rounded text-sm border border-gray-700">${prefix}</span> <span class="flex-1">${option}</span>`;
                
                btn.onclick = () => selectOption(idx, btn);
                
                if(userAnswers[currentQuestionIdx] === idx) {
                    btn.classList.remove('border-gray-600', 'bg-gray-700/80');
                    btn.classList.add('border-blue-500', 'bg-blue-950/50');
                }
                
                optionsContainer.appendChild(btn);
            });

            const nextBtn = document.getElementById('next-btn');
            
            if (userAnswers[currentQuestionIdx] !== undefined) {
                nextBtn.disabled = false;
            } else {
                nextBtn.disabled = true;
            }

            if (currentQuestionIdx === quizData.length - 1) {
                nextBtn.innerText = "Finish & Analysis 📊";
            } else {
                nextBtn.innerText = "Next Question ➡️";
            }
        }

        function selectOption(index, selectedButton) {
            userAnswers[currentQuestionIdx] = index;
            const buttons = document.getElementById('options-container').children;
            for(let btn of buttons) {
                btn.classList.remove('border-blue-500', 'bg-blue-950/50');
                btn.classList.add('border-gray-600', 'bg-gray-700/80');
            }
            selectedButton.classList.remove('border-gray-600', 'bg-gray-700/80');
            selectedButton.classList.add('border-blue-500', 'bg-blue-950/50');
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestionIdx < quizData.length - 1) {
                currentQuestionIdx++;
                showQuestion();
            } else {
                renderEvaluationScreen();
            }
        }

        function confirmEarlySubmit() {
            let attempted = userAnswers.filter(a => a !== undefined).length;
            if(confirm(`Bhai, aapne ${quizData.length} me se sirf ${attempted} questions kiye hain. Kya sach me submit karna chahte ho?`)) {
                renderEvaluationScreen();
            }
        }

        function goBackToHome() {
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        function renderEvaluationScreen() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');

            score = 0;
            quizData.forEach((q, idx) => {
                if(userAnswers[idx] === q.correctIndex) {
                    score++;
                }
            });

            document.getElementById('score-obtained').innerText = score;
            document.getElementById('total-score').innerText = quizData.length;

            const analysisContainer = document.getElementById('analysis-container');
            analysisContainer.innerHTML = '';

            quizData.forEach((q, idx) => {
                const isCorrect = userAnswers[idx] === q.correctIndex;
                const card = document.createElement('div');
                card.className = `p-6 rounded-xl border ${isCorrect ? 'bg-green-950/20 border-green-800/60' : 'bg-red-950/20 border-red-900/60'} space-y-4 shadow-md`;
                
                const prefixArray = ['A', 'B', 'C', 'D'];
                const userAnsText = q.options[userAnswers[idx]] !== undefined ? `${prefixArray[userAnswers[idx]]}. ${q.options[userAnswers[idx]]}` : "Attempt nahi kiya ❌";
                const correctAnsText = `${prefixArray[q.correctIndex]}. ${q.options[q.correctIndex]}`;

                card.innerHTML = `
                    <div class="flex items-start justify-between gap-4">
                        <p class="font-bold text-lg text-white leading-relaxed">Q${idx + 1}: ${q.question}</p>
                        <span class="px-3 py-1 rounded text-xs font-black uppercase tracking-wider ${isCorrect ? 'bg-green-900/60 text-green-400 border border-green-700' : 'bg-red-900/60 text-red-400 border border-red-700'}">
                            ${isCorrect ? 'Correct' : 'Incorrect'}
                        </span>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm border-t border-b border-gray-700/40 py-3
